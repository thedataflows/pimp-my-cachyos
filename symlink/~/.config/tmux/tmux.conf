unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB,screen*:RGB,tmux*:RGB,alacritty*:RGB,foot*:RGB,kitty*:RGB,wezterm*:RGB,rxvt*:RGB,st*:RGB"

set -g status-position top
set -g status-interval 2
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 48
set -g status-right-length 96
set -g status-left "#[fg=#89b4fa,bg=#1e1e2e]#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e]"
set -g status-right "#[fg=#f38ba8,bg=#1e1e2e]#{?client_prefix,PREFIX ,}#[fg=#94e2d5,bg=#1e1e2e]#(whoami)@#H #[fg=#f9e2af,bg=#1e1e2e]#[fg=#1e1e2e,bg=#f9e2af,bold] %Y-%m-%d %H:%M #[fg=#f9e2af,bg=#1e1e2e]"

setw -g window-status-separator ""
setw -g window-status-style "fg=#bac2de,bg=#1e1e2e"
setw -g window-status-format "#[fg=#313244,bg=#1e1e2e]#[fg=#bac2de,bg=#313244] #I #{?window_zoomed_flag,Z ,}#W #[fg=#313244,bg=#1e1e2e]"
setw -g window-status-current-style "fg=#1e1e2e,bg=#a6e3a1,bold"
setw -g window-status-current-format "#[fg=#a6e3a1,bg=#1e1e2e]#[fg=#1e1e2e,bg=#a6e3a1,bold] #I #{?window_zoomed_flag,Z ,}#W #[fg=#a6e3a1,bg=#1e1e2e]"
setw -g window-status-last-style "fg=#1e1e2e,bg=#89b4fa,bold"
setw -g window-status-bell-style "fg=#1e1e2e,bg=#f38ba8,bold"

set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "fg=#1e1e2e,bg=#f9e2af"
set -g message-command-style "fg=#1e1e2e,bg=#f38ba8"
set -g mode-style "fg=#1e1e2e,bg=#f9e2af"

## https://yazi-rs.github.io/docs/image-preview#tmux
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

bind -N "last-session (sesh)" L run-shell "sesh last"

bind-key "T" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh
